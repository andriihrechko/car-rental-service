services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - media_data:/app/mediafiles
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery:
    build: .
    command: celery -A core worker -l info
    env_file:
      - .env
    depends_on:
      - redis

  beat:
    build: .
    command: celery -A core beat -l info
    env_file:
      - .env
    depends_on:
      - redis

  stripe-cli:
    image: stripe/stripe-cli
    command: listen --forward-to app:8000/api/service/payments/webhook/
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      app:
        condition: service_started

volumes:
  postgres_data:
  media_data:
  redis_data:
