services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - media_data:/app/mediafiles
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  stripe-cli:
    image: stripe/stripe-cli
    command: listen --forward-to app:8000/api/payments/webhook/
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      app:
        condition: service_started

volumes:
  postgres_data:
  media_data:
  redis_data:
