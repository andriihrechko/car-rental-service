services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - media_data:/app/mediafiles
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

volumes:
  postgres_data:
  media_data:
