[tool.ruff]
extend-exclude = ["**migrations", "tests",]
line-length = 79


[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "B",
    "SIM",
    "I"
]

ignore = ["F401",]


[tool.ruff.lint.mccabe]
max-complexity = 18


[tool.ruff.lint.isort]
lines-after-imports = 2


[tool.ruff.lint.per-file-ignores]
"core/settings.py" = ["E501"]